<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO 玩家工具箱 | 遊戲開發作品集</title>
    <style>
    :root { 
        --primary: #5f27cd; /* 祭司紫 */
        --secondary: #2196f3; /* 騎士藍 */
        --bg-overlay: rgba(255, 255, 255, 0.85); /* 輕透白底 */
        --accent: #ff9f43; /* 鐵匠橘 */
    }

    body { 
        font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
        /* 背景圖設定：這裡使用一張高品質的幻想風格風景圖作為底圖 */
        background: url('https://cdn-bgp.bluestacks.com/BGP/tw/app_page_com.ggv.rebirth.cbt.jpg') no-repeat center center fixed; 
        background-size: cover;
        display: flex; 
        justify-content: center; 
        align-items: center; 
        min-height: 100vh; 
        margin: 0; 
    }

    .hub-container { 
        text-align: center; 
        max-width: 900px; 
        padding: 40px;
        background: var(--bg-overlay); /* 讓內容在背景圖上清晰可見 */
        border-radius: 30px;
        backdrop-filter: blur(10px); /* 磨砂玻璃效果 */
        box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        border: 2px solid rgba(255,255,255,0.3);
    }

    h1 { 
        color: #2d3436; 
        margin-bottom: 5px; 
        font-size: 2.8rem; 
        text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    p.subtitle { color: #636e72; margin-bottom: 40px; font-weight: 500; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
    
    .tool-card { 
        background: white; 
        padding: 35px; 
        border-radius: 25px; 
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        text-decoration: none; 
        color: inherit; 
        display: flex; 
        flex-direction: column; 
        align-items: center;
        border: 1px solid #eee;
    }

    .tool-card:hover { 
        transform: scale(1.05); 
        box-shadow: 0 15px 35px rgba(95, 39, 205, 0.2); 
        border-color: var(--primary);
    }
    
    .icon { font-size: 4rem; margin-bottom: 20px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
    .tool-name { font-size: 1.6rem; font-weight: bold; color: var(--primary); margin-bottom: 12px; }
    .tool-desc { color: #636e72; font-size: 1rem; line-height: 1.6; }
    
    .status-badge { 
        margin-top: 20px; 
        padding: 6px 16px; 
        border-radius: 50px; 
        font-size: 0.85rem; 
        font-weight: bold;
        letter-spacing: 1px;
    }
    .stable { background: #dff9fb; color: #130f40; }
    .secure { background: #fce4ec; color: #d81b60; }
    </style>
</head>
<body>

<div class="hub-container">
    <h1>⚔️ RO 玩家工具箱</h1>
    <p class="subtitle">整合精煉模擬與財政管理的一站式開發作品集</p>

    <div class="grid">
        <a href="refine.html" class="tool-card">
            <div class="icon">💎</div>
            <div class="tool-name">精煉戰情室 v6.6.0</div>
            <div class="tool-desc">
                支援二階精煉模擬、歐非判定系統與即時材料成本同步。科學化分析您的點裝運氣。
            </div>
            <span class="status-badge stable">正式發布</span>
        </a>

        <a href="finance.html" class="tool-card">
            <div class="icon">💰</div>
            <div class="tool-name">財政部長 v3.90</div>
            <div class="tool-desc">
                BYOK 安全架構記帳系統。包含多角色資產追蹤、動態報表與雲端加密同步。
            </div>
            <span class="status-badge secure">BYOK 安全加密</span>
        </a>
    </div>

    <p style="margin-top: 50px; color: #bdc3c7; font-size: 0.8rem;">
        &copy; 2026 RO 工具箱開發計畫 - 讓數據導航您的冒險之路
    </p>
</div>

</body>
</html>
