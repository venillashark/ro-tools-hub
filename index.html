<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RO 玩家工具箱 | 遊戲開發作品集</title>
    <style>
        :root { --primary: #0984e3; --secondary: #6c5ce7; --bg: #f5f6fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .hub-container { text-align: center; max-width: 800px; padding: 20px; }
        h1 { color: #2f3640; margin-bottom: 10px; font-size: 2.5rem; }
        p.subtitle { color: #7f8c8d; margin-bottom: 40px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .tool-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); transition: transform 0.3s, box-shadow 0.3s; text-decoration: none; color: inherit; display: flex; flex-direction: column; align-items: center; }
        .tool-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); border: 2px solid var(--primary); }
        
        .icon { font-size: 3rem; margin-bottom: 15px; }
        .tool-name { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin-bottom: 10px; }
        .tool-desc { color: #636e72; font-size: 0.95rem; line-height: 1.6; }
        .status-badge { margin-top: 15px; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
        .stable { background: #e3fcef; color: #00b894; }
        .secure { background: #e0f2ff; color: #0984e3; }
    </style>
</head>
<body>

<div class="hub-container">
    <h1>⚔️ RO 玩家工具箱</h1>
    <p class="subtitle">整合精煉模擬與財政管理的一站式開發作品集</p>

    <div class="grid">
        <a href="refine.html" class="tool-card">
            <div class="icon">💎</div>
            <div class="tool-name">精煉戰情室 v6.5.1</div>
            <div class="tool-desc">
                支援二階精煉模擬、歐非判定系統與即時材料成本同步。科學化分析您的點裝運氣。
            </div>
            <span class="status-badge stable">正式發布</span>
        </a>

        <a href="finance.html" class="tool-card">
            <div class="icon">💰</div>
            <div class="tool-name">財政部長 v3.90</div>
            <div class="tool-desc">
                BYOK 安全架構記帳系統。包含多角色資產追蹤、動態報表與雲端加密同步。
            </div>
            <span class="status-badge secure">BYOK 安全加密</span>
        </a>
    </div>

    <p style="margin-top: 50px; color: #bdc3c7; font-size: 0.8rem;">
        &copy; 2026 RO 工具箱開發計畫 - 讓數據導航您的冒險之路
    </p>
</div>

</body>
</html>
